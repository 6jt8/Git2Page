name: Feature Request
description: Suggest a new feature or enhancement for Git2Page
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please describe your idea as clearly as possible.
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when [...] / It would be great if Git2Page could [...]
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see.
      placeholder: Add a new section in git2page.config.ts that allows [...]
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear description of any alternative solutions or features you've considered.
      placeholder: I also thought about using [...] but it wouldn't work because [...]
    validations:
      required: false
  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area of Git2Page does this feature relate to?
      options:
        - New Section / Component
        - Theme / Styling
        - Configuration / Customization
        - SEO / Analytics
        - PWA / Performance
        - Deployment / CI
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, mockups, or references.
      placeholder: Here is a mockup of how this could look [...]
    validations:
      required: false
  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      description: Would you be willing to submit a PR for this feature?
      options:
        - label: I'm willing to submit a PR for this feature
          required: false
